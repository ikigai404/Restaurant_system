
{% extends "layout.html" %}
{% block title %}Place Order - Restaurant System{% endblock %}

{% block content %}  
    <h1>{{ category|capitalize }} Menu</h1>
    <p>Select the items you wish to order:</p>

    <form action="/review_order" method="POST">
        <input type="hidden" name="category" value="{{ category }}">
        <table style="border-collapse: collapse; border: none;">
            {% for item in items %}
                <tr>
                    <td style="border: none; padding: 5px;">
                        <input type="checkbox" name="selected_items" value="{{ item.name }}|{{ item.price }}" id="item_{{ loop.index }}">
                    </td>
                    <td style="border: none; padding: 5px;">
                        <label for="item_{{ loop.index }}">
                            {{ item.name }} - Rs {{ "%.2f"|format(item.price) }}
                        </label>
                    </td>
                </tr>
            {% endfor %}
        </table>
        <br>
        <button type="submit" name="category" value="beverages" class="order-button" formaction="/menu" formmethod="GET">Order Beverage</button>
        <button type="submit" class="order-button">Review Order</button>
    </form>

    <br>
    <a href="/place_order">Back to Categories</a>
{% endblock %}
