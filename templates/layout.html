<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            text-align: left;
            margin: 0 auto;
        }
	body {
            background: linear-gradient(135deg, #070707, #121212, #1C1C1C, #2B2416);
	    font-family: Lucida Sans Unicode;
	}
	h1 {
	    color: #F2F2F2;
	}
	p, label {
            color: #B8B8B8;
	}
	p {
	    font-size:22px;
	}
	.top {
    	    background: linear-gradient(165deg, #0A0A0A, #1A1A1A, #322814, #7A5C2E);
   	    display: flex;
	    justify-content: space-between; 
            align-items: flex-start;
            padding: 10px 20px;
	}
	.switch {
	    display: flex;
  	    align-items: center;
    	    gap: 5px;
	    margin-top: 100px;
	}
      </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Restaurant System{% endblock %}</title>
</head>
<body>
    <div class="top">
    <h2 style="color: #7A5C2E;">Restaurant Management System</h2>
    <div class="switch">
    <input type="checkbox" id="theme-toggle">
    <label for="theme-toggle" class="toggle-btn">Light Mode
    </label><br><br>
    </div>
    </div>
    <hr>

    <main>
        {% block content %}{% endblock %}
    </main>

    <hr>
    <footer>
	<br>
        <p style="font-size: 12px; color: #7A7A7A; margin-bottom: 75px;">&copy; 2026 Restaurant Order System. All rights reserved.</p>
    </footer>
</body>
</html>
