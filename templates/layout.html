<!DOCTYPE html>
<html lang="en">

<head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            text-align: left;
            margin: 0 auto;
        }

        body {
            background: linear-gradient(150deg, #070707, #141116, #1c1c1c, #1e162b);
        }

        h1 {
            color: #F2F2F2;
        }

        p,
        label {
            color: #B8B8B8;
        }

        p {
            font-size: 22px;
        }

        hr {
            border-color: #af82d8;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Restaurant System{% endblock %}</title>
</head>
<div class="container-fluid">

    <body style="font-family: 'Courier New', Courier, monospace;">
        <br>
        <h4 style="text-align: center; color: rgba(255, 255, 255, 0.605);"> 🍽 Restaurant Management System</h4>
        <hr>

        <main>
            {% block content %}{% endblock %}
        </main>

        <hr>
        <center>
            <footer>
                <br>
                <p style="font-size: 12px; color: #f6f4f895; margin-bottom: 75px;">&copy; 2026 Restaurant Order System.
                    All rights
                    reserved.</p>
            </footer>
        </center>
    </body>
</div>

</html>
